const MONTHS=[{y:2026,m:6,name:'6월 2026'},{y:2026,m:7,name:'7월 2026'},{y:2026,m:8,name:'8월 2026'}];
const DOWS=['월','화','수','목','금','토','일'];

function firstDow(y,m){return(new Date(y,m-1,1).getDay()+6)%7;}
function daysIn(y,m){return new Date(y,m,0).getDate();}

let selectedKey=null;

function renderDetail(key){
  const p=P[key];
  const dp=document.getElementById('detail-panel');
  dp.classList.add('active');
  dp.innerHTML=`
    <div class="dp-header">
      <div class="dp-num">No.${p.n}</div>
      <div>
        <div class="dp-title">${p.t}</div>
        <div class="dp-sub">${p.sub}</div>
      </div>
    </div>
    <div class="dp-badges">
      <span class="dp-badge ${TC[p.tp]}">${TL[p.tp]}</span>
      <span class="dp-badge bfmt">${p.f}</span>
      ${p.pdl?'<span class="dp-badge bpdl">Pick.Drop.Layer.</span>':''}
    </div>
    <div class="dp-idea-label">연출 아이디어</div>
    <div class="dp-idea">${p.idea}</div>
  `;
}

function buildMonth(y,m,name){
  const fd=firstDow(y,m),total=daysIn(y,m);
  const count=Object.keys(P).filter(k=>k.startsWith(`${y}-${m}-`)).length;
  let h=`<div class="cal-month"><h2 class="cal-month-h">${name}<span class="cal-month-count">${count}개</span></h2><div class="cal-grid">`;
  DOWS.forEach(d=>{h+=`<div class="cal-dow">${d}</div>`;});
  for(let i=0;i<fd;i++) h+=`<div class="cal-cell np"></div>`;
  for(let d=1;d<=total;d++){
    const k=`${y}-${m}-${d}`;
    const dow=(fd+d-1)%7;
    const we=dow>=5;
    const p=P[k];
    if(p){
      h+=`<div class="cal-cell hp" data-key="${k}" onclick="selectPost('${k}')">`;
      h+=`<div class="cdate">${d}</div>`;
      h+=`<div class="ccard ${TC[p.tp]}">`;
      h+=`<div class="cpnum">No.${p.n}</div>`;
      h+=`<div class="cptit">${p.t}</div>`;
      h+=`<div class="cfoot"><span class="cbadge bfmt">${p.f}</span>${p.pdl?'<span class="cbadge bpdl-small">PDL</span>':''}</div>`;
      h+=`</div></div>`;
    } else {
      h+=`<div class="cal-cell np${we?' we':''}""><div class="cdate">${d}</div></div>`;
    }
  }
  const rem=(fd+total)%7;
  if(rem) for(let i=0;i<7-rem;i++) h+=`<div class="cal-cell np"></div>`;
  h+=`</div></div>`;
  return h;
}

function selectPost(key){
  if(selectedKey){
    const prev=document.querySelector(`[data-key="${selectedKey}"]`);
    if(prev) prev.classList.remove('selected');
  }
  selectedKey=key;
  const el=document.querySelector(`[data-key="${key}"]`);
  if(el) el.classList.add('selected');
  renderDetail(key);
  document.getElementById('detail-panel').scrollIntoView({behavior:'smooth',block:'nearest'});
}

let html='';
MONTHS.forEach(({y,m,name})=>{html+=buildMonth(y,m,name);});
document.getElementById('cal-months').innerHTML=html;
</script>
