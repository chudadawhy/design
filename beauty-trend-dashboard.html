  .panel-head{margin-bottom:16px}

<!-- ===================== /SNAPSHOTS ===================== -->

<script>
  // 스냅샷 수집
  const tags = [...document.querySelectorAll('script.snapshot')];
  const snaps = tags.map(t=>({date:t.dataset.date, note:t.dataset.note||'', html:t.innerHTML}))
                    .sort((a,b)=>b.date.localeCompare(a.date));
  const dateSet = new Set(snaps.map(s=>s.date));
  let selected = null;
  let view = new Date();
  const todayStr = new Date().toISOString().slice(0,10);
  const pad = n => String(n).padStart(2,'0');
  const ymd = (y,m,d)=>`${y}-${pad(m+1)}-${pad(d)}`;

  const viewer = document.getElementById('viewer');

  function initTabs(){
    const tabs = viewer.querySelectorAll('.tab');
    const panels = viewer.querySelectorAll('.panel');
    tabs.forEach(t=>t.addEventListener('click',()=>{
      tabs.forEach(x=>x.classList.remove('active'));
      panels.forEach(p=>p.classList.remove('active'));
      t.classList.add('active');
      const target = [...panels].find(p=>p.dataset.panel===t.dataset.tab);
      if(target) target.classList.add('active');
      viewer.scrollTo({top:0,behavior:'smooth'});
    }));
  }

  function loadDate(date){
    const snap = snaps.find(s=>s.date===date);
    if(!snap) return;
    selected = date;
    viewer.innerHTML = snap.html;
    initTabs();
    viewer.scrollTop = 0;
    document.getElementById('viewing-date').textContent = date;
    renderCalendar(); renderList();
  }

  function renderList(){
    const el = document.getElementById('snap-list'); el.innerHTML='';
    snaps.forEach(s=>{
      const d=document.createElement('div');
      d.className='snap-item'+(s.date===selected?' sel':'');
      d.innerHTML=`<span class="n" style="opacity:1;font-weight:600">${s.date}</span><span class="n">${s.note}</span>`;
      d.onclick=()=>loadDate(s.date);
      el.appendChild(d);
    });
  }

  function renderCalendar(){
    const y=view.getFullYear(), m=view.getMonth();
    document.getElementById('cal-month').textContent=`${y}년 ${m+1}월`;
    const first=new Date(y,m,1).getDay(), days=new Date(y,m+1,0).getDate();
    const body=document.getElementById('cal-body'); body.innerHTML='';
    let row=document.createElement('tr');
    for(let i=0;i<first;i++) row.appendChild(document.createElement('td'));
    for(let d=1;d<=days;d++){
      const ds=ymd(y,m,d), td=document.createElement('td'), cell=document.createElement('div');
      cell.className='day'; cell.textContent=d;
      if(dateSet.has(ds)) cell.classList.add('has');
      if(ds===selected) cell.classList.add('sel');
      if(ds===todayStr) cell.classList.add('today');
      if(dateSet.has(ds)) cell.onclick=()=>loadDate(ds);
      td.appendChild(cell); row.appendChild(td);
      if((first+d)%7===0){ body.appendChild(row); row=document.createElement('tr'); }
    }
    if(row.children.length) body.appendChild(row);
  }

  document.getElementById('prev').onclick=()=>{view.setMonth(view.getMonth()-1);renderCalendar();};
  document.getElementById('next').onclick=()=>{view.setMonth(view.getMonth()+1);renderCalendar();};
  document.getElementById('latest-btn').onclick=()=>{ if(snaps.length){ view=new Date(snaps[0].date); loadDate(snaps[0].date);} };

  if(snaps.length){ view=new Date(snaps[0].date); loadDate(snaps[0].date); }
  else { renderCalendar(); viewer.innerHTML='<div style="padding:60px;text-align:center;color:#8a807a">저장된 스냅샷이 없습니다.</div>'; }
</script>
