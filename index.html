<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Hub</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif;
      background: #0f0f13;
      color: #e8e8f0;
      min-height: 100vh;
    }

    header {
      padding: 40px 48px 32px;
      border-bottom: 1px solid #1e1e2e;
    }

    header h1 {
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.3px;
      color: #fff;
    }

    header p {
      margin-top: 6px;
      font-size: 13px;
      color: #9898b8;
    }

    .toolbar {
      padding: 20px 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid #1e1e2e;
    }

    .search-box {
      flex: 1;
      max-width: 320px;
      background: #1a1a26;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      padding: 8px 14px;
      color: #e8e8f0;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-box:focus { border-color: #5b5bf0; }
    .search-box::placeholder { color: #8888a8; }

    .filter-btns {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #2a2a3e;
      background: transparent;
      color: #b0b0cc;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { border-color: #5b5bf0; color: #c0c0e0; }
    .filter-btn.active { background: #5b5bf0; border-color: #5b5bf0; color: #fff; }

    .refresh-btn {
      margin-left: auto;
      padding: 7px 16px;
      border-radius: 8px;
      border: 1px solid #2a2a3e;
      background: transparent;
      color: #b0b0cc;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .refresh-btn:hover { border-color: #5b5bf0; color: #c0c0e0; }

    .main {
      padding: 32px 48px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: #8888a8;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 14px;
      margin-bottom: 40px;
    }

    .card {
      background: #14141e;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.18s;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      border-color: #3a3a5e;
      background: #18182a;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    }

    .card-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      margin-bottom: 14px;
    }

    .card-name {
