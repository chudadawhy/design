<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>뷰티 트렌드 대시보드 — 런처</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f8fafc; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { background: white; border-radius: 20px; padding: 48px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); max-width: 520px; width: 100%; }
    h1 { font-size: 22px; font-weight: 800; color: #1e293b; margin-bottom: 8px; }
    .subtitle { font-size: 13px; color: #94a3b8; margin-bottom: 32px; }
    .sources { display: flex; gap: 6px; margin-bottom: 32px; }
    .sources span { width: 8px; height: 8px; border-radius: 50%; }
    .field { margin-bottom: 20px; }
    .field label { display: block; font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    .field input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 12px; font-size: 16px; color: #1e293b; outline: none; transition: border-color 0.2s; }
    .field input:focus { border-color: #3b82f6; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #1e293b; color: white; margin-bottom: 10px; }
    .btn-primary:hover { background: #334155; transform: translateY(-1px); }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; transform: none; }
    .btn-secondary { background: #f1f5f9; color: #475569; }
    .btn-secondary:hover { background: #e2e8f0; }
    .status { margin-top: 24px; padding: 16px; background: #f8fafc; border-radius: 12px; border: 1px solid #e2e8f0; display: none; }
    .status.show { display: block; }
    .status-header { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-dot.running { background: #f59e0b; animation: pulse 1s infinite; }
    .status-dot.done { background: #22c55e; }
    .status-dot.error { background: #ef4444; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .status-title { font-size: 13px; font-weight: 700; color: #334155; }
    .logs { max-height: 200px; overflow-y: auto; font-family: 'SF Mono', monospace; font-size: 11px; color: #64748b; line-height: 1.8; }
    .logs p { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .progress-bar { height: 4px; background: #e2e8f0; border-radius: 2px; margin-bottom: 12px; overflow: hidden; }
    .progress-bar .fill { height: 100%; background: #3b82f6; border-radius: 2px; transition: width 0.5s; }
    .last-run { font-size: 11px; color: #94a3b8; margin-top: 16px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <h1>뷰티 트렌드 대시보드</h1>
    <p class="subtitle">데이터 수집 → AI 분석 → 대시보드 자동 실행</p>
    <div class="sources">
      <span style="background:#f97316" title="Reddit"></span>
      <span style="background:#3b82f6" title="Google"></span>
      <span style="background:#010101" title="TikTok"></span>
      <span style="background:#22c55e" title="네이버"></span>
    </div>

    <div class="field">
      <label>날짜</label>
      <input type="date" id="dateInput">
    </div>

    <button class="btn btn-primary" id="runBtn" onclick="runPipeline()">데이터 수집 & 대시보드 실행</button>
    <button class="btn btn-secondary" id="openBtn" onclick="openDashboard()">대시보드 바로 열기</button>

    <div class="status" id="statusBox">
      <div class="status-header">
        <span class="status-dot" id="statusDot"></span>
        <span class="status-title" id="statusTitle">대기 중</span>
      </div>
      <div class="progress-bar"><div class="fill" id="progressFill" style="width:0%"></div></div>
      <div class="logs" id="logs"></div>
    </div>

    <p class="last-run" id="lastRun"></p>
  </div>

  <script>
    const API = 'http://localhost:4000'
    const dateInput = document.getElementById('dateInput')
    dateInput.value = new Date().toISOString().split('T')[0]

    checkLastRun()

    async function runPipeline() {
      const btn = document.getElementById('runBtn')
      const statusBox = document.getElementById('statusBox')
      const statusDot = document.getElementById('statusDot')
      const statusTitle = document.getElementById('statusTitle')
      const logs = document.getElementById('logs')
      const progressFill = document.getElementById('progressFill')

      btn.disabled = true
      btn.textContent = '수집 중...'
      statusBox.classList.add('show')
      statusDot.className = 'status-dot running'
      statusTitle.textContent = '파이프라인 실행 중...'
      logs.innerHTML = '<p>시작 중...</p>'
      progressFill.style.width = '5%'

      try {
        await fetch(`${API}/api/admin/run-pipeline`, { method: 'POST' })

        const poll = setInterval(async () => {
          try {
            const res = await fetch(`${API}/api/admin/pipeline-status`)
            const status = await res.json()

            logs.innerHTML = (status.logs || []).slice(-15).map(l => `<p>${l}</p>`).join('')
            logs.scrollTop = logs.scrollHeight

            const stepMatch = status.logs?.findLast(l => l.match(/\[\d+\/\d+\]/))
            if (stepMatch) {
              const m = stepMatch.match(/\[(\d+)\/(\d+)\]/)
              if (m) progressFill.style.width = Math.round((parseInt(m[1]) / parseInt(m[2])) * 90 + 5) + '%'
            }

            if (!status.running) {
              clearInterval(poll)
              progressFill.style.width = '100%'

              if (status.lastResult === 'success') {
                statusDot.className = 'status-dot done'
                statusTitle.textContent = '완료! 대시보드를 엽니다...'
                btn.textContent = '완료!'
                setTimeout(() => openDashboard(), 1500)
              } else {
                statusDot.className = 'status-dot error'
                statusTitle.textContent = '오류 발생: ' + (status.lastResult || '')
                btn.textContent = '다시 시도'
                btn.disabled = false
              }
              checkLastRun()
            }
          } catch {}
        }, 1500)
      } catch (err) {
        statusDot.className = 'status-dot error'
        statusTitle.textContent = '서버 연결 실패 — 백엔드가 실행 중인지 확인하세요'
        btn.textContent = '다시 시도'
        btn.disabled = false
      }
    }

    function openDashboard() {
      window.open('http://localhost:5173/', '_blank')
    }

    async function checkLastRun() {
      try {
        const res = await fetch(`${API}/api/admin/pipeline-status`)
        const status = await res.json()
        if (status.lastRun) {
          const d = new Date(status.lastRun)
          document.getElementById('lastRun').textContent = `마지막 실행: ${d.toLocaleDateString('ko-KR')} ${d.toLocaleTimeString('ko-KR')}`
        }
      } catch {
        document.getElementById('lastRun').textContent = '서버 미연결 — node backend/src/server.js 실행 필요'
      }
    }
  </script>
</body>
</html>
